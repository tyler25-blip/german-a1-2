<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>設定 — 德文 A1.2</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="德文 A1.2" />
  <meta name="theme-color" content="#b45309" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title"><a href="./index.html">🇩🇪 德文 A1.2 自學</a></h1>
      <nav class="site-nav">
        <a href="./index.html">章節</a>
        <a href="./flashcards.html">單字卡</a>
        <a href="./grammar.html">文法手冊</a>
        <a href="./progress.html">進度</a>
        <a href="./settings.html">設定</a>
      </nav>
    </div>
  </header>

  <main>
    <h1>設定</h1>
    <p class="lead">設定 Anthropic API key 來啟用 Claude 對話功能。</p>

    <section class="section-block">
      <h3>Anthropic API Key</h3>
      <div class="form-row">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
        <p class="desc">取得方式：登入 <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noreferrer">Anthropic Console</a> → API Keys → Create Key</p>
        <p class="desc">⚠️ Key 只存在你的瀏覽器 <code>localStorage</code>，不會上傳任何地方。但別把這台電腦的整個資料夾分享給別人。</p>
      </div>

      <div class="form-row">
        <label for="model">模型</label>
        <select id="model">
          <option value="claude-sonnet-4-6">Sonnet 4.6（推薦：快、夠強）</option>
          <option value="claude-opus-4-7">Opus 4.7（最強，但較貴較慢）</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5（最便宜，回答較簡略）</option>
        </select>
      </div>

      <div class="form-row">
        <button id="save-settings" class="btn">儲存</button>
        <button id="test-key" class="btn secondary">測試 API key</button>
      </div>
    </section>

    <section class="section-block">
      <h3>顯示</h3>
      <div class="form-row">
        <label for="font-size">字級</label>
        <select id="font-size">
          <option value="14">小 (14px)</option>
          <option value="16" selected>中 (16px)</option>
          <option value="18">大 (18px)</option>
          <option value="20">特大 (20px)</option>
        </select>
      </div>
    </section>

    <section class="section-block">
      <h3>進度</h3>
      <p>已完成練習：<strong id="progress-stats">—</strong></p>
      <button id="clear-progress" class="btn secondary">清除所有作答記錄</button>
    </section>
  </main>

  <button id="chat-fab" class="chat-fab" aria-label="開啟 Claude 對話">💬</button>
  <div id="chat-panel" class="chat-panel"></div>
  <div id="toast" class="toast"></div>

  <script src="./assets/js/settings.js"></script>
  <script src="./assets/js/progress.js"></script>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/chat.js"></script>
  <script src="./assets/js/keyboard.js"></script>
  <script>
    Settings.bindUI();
  </script>
</body>
</html>
